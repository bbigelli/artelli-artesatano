version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: artelli_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artelli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artelli123}
      POSTGRES_DB: ${POSTGRES_DB:-artelli_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artelli -d artelli_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artelli_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artelli}:${POSTGRES_PASSWORD:-artelli123}@db:5432/${POSTGRES_DB:-artelli_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artelli_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
